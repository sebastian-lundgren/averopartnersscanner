# Render Blueprint: Web Service for FastAPI (Python).
# Koble Git-repo, eller lim inn som "Blueprint". Sett secrets i Render Dashboard.
services:
  - type: web
    name: streetview-scanner-api
    runtime: python
    rootDir: backend
    # Runner-venv MÅ ligge under backend/ — Render gjør filer utenfor rootDir utilgjengelige (se monorepo-dok).
    buildCommand: |
      pip install -r requirements.txt
      python3 -m venv .venv-runner \
        && .venv-runner/bin/pip install -U pip \
        && .venv-runner/bin/pip install -r runner_venv_requirements.txt \
        && .venv-runner/bin/python -m playwright install --with-deps chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
