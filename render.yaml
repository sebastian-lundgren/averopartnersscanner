# Render Blueprint: Web Service for FastAPI (Python).
# Koble Git-repo, eller lim inn som "Blueprint". Sett secrets i Render Dashboard.
services:
  - type: web
    name: streetview-scanner-api
    runtime: python
    rootDir: backend
    # GSV-scan kjører python -m runner fra repo-rot med .venv-runner (se gsv_scan_job_runner.py).
    buildCommand: |
      pip install -r requirements.txt
      cd .. && python3 -m venv .venv-runner \
        && .venv-runner/bin/pip install -U pip \
        && .venv-runner/bin/pip install -r runner/requirements.txt \
        && .venv-runner/bin/python -m playwright install --with-deps chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
